services:
  db:
    image: mariadb:10.11
    volumes:
      - db_data:/var/lib/mysql
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-wordpress}
      MARIADB_USER: ${MYSQL_USER:-wpuser}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD:-wppassword}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  wordpress:
    depends_on:
      db:
        condition: service_healthy
    image: wordpress:latest
    ports:
      - "${WP_PORT:-8082}:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: ${MYSQL_USER:-wpuser}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-wppassword}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-wordpress}
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes/idotinfra-theme:/var/www/html/wp-content/themes/idotinfra-theme

  phpmyadmin:
    depends_on:
      - db
    image: phpmyadmin:latest
    ports:
      - "${PMA_PORT:-8083}:80"
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}

volumes:
  db_data:
  wp_data:
